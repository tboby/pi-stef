name: Publish to npm

on:
  push:
    tags:
      - "@pi-stef/*@*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG_NAME="${TAG%@*}"
          VERSION="${TAG##*@}"
          PKG_DIR="${PKG_NAME#@pi-stef/}"
          echo "pkg_name=${PKG_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "pkg_dir=${PKG_DIR}" >> "$GITHUB_OUTPUT"
          echo "Package: ${PKG_NAME}"
          echo "Version: ${VERSION}"
          echo "Directory: ${PKG_DIR}"

      - name: Verify version matches package.json
        run: |
          PKG_VERSION=$(node -p "require('./packages/${{ steps.tag.outputs.pkg_dir }}/package.json').version")
          if [ "${PKG_VERSION}" != "${{ steps.tag.outputs.version }}" ]; then
            echo "Version mismatch!"
            echo "  Tag version: ${{ steps.tag.outputs.version }}"
            echo "  package.json version: ${PKG_VERSION}"
            exit 1
          fi
          echo "Version verified: ${PKG_VERSION}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Convert file deps for publish
        run: |
          PKG_DIR="${{ steps.tag.outputs.pkg_dir }}"
          PKG_FILE="packages/${PKG_DIR}/package.json"
          node scripts/ci-convert-deps.mjs "$PKG_FILE"
          echo "Converted file deps in ${PKG_FILE}"

      - name: Sync lockfile
        run: pnpm install --no-frozen-lockfile

      - name: Publish to npm
        run: pnpm --filter ${{ steps.tag.outputs.pkg_name }} publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        run: |
          PKG_DIR="${{ steps.tag.outputs.pkg_dir }}"
          VERSION="${{ steps.tag.outputs.version }}"
          TAG="${{ github.ref_name }}"
          CHANGELOG_FILE="packages/${PKG_DIR}/CHANGELOG.md"
          if [ -f "$CHANGELOG_FILE" ]; then
            ESCAPED_VERSION="${VERSION//./\\.}"
            BODY=$(sed -n "/^## \[${ESCAPED_VERSION}\]/,/^## \[/p" "$CHANGELOG_FILE" | sed '$d')
          else
            BODY="Release ${VERSION}"
          fi
          gh release create "$TAG" --title "${PKG_DIR} v${VERSION}" --notes "$BODY"
        env:
          GH_TOKEN: ${{ github.token }}
